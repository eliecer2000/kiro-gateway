name: Release source archive

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install test dependencies
        run: python -m pip install -r requirements.txt

      - name: Test installer and runtime configuration
        run: pytest tests/unit/install_script tests/unit/test_config.py -q

      - name: Build verified release assets
        env:
          VERSION: ${{ github.ref_name }}
        run: |
          VERSION="${VERSION#v}"
          scripts/build-release.sh "$VERSION" dist
          (cd dist && sha256sum --check SHA256SUMS)

      - name: Publish versioned tarball and checksums
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/kiro-gateway-*.tar.gz
            dist/SHA256SUMS
          fail_on_unmatched_files: true
